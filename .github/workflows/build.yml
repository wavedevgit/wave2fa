name: Build

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version number to use for this build'
                required: true
                default: '0.0.1'
            branch:
                description: 'Branch to build'
                required: true
                default: 'main'

jobs:
    build:
        permissions:
            contents: write

        runs-on: ubuntu-latest

        steps:
            - name: Checkout source code repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1
                  ref: ${{ github.event.inputs.branch }}
            - name: Checkout releases repo
              uses: actions/checkout@v4
              with:
                  repository: wavedevgit/wave2fa-releases
                  token: ${{ secrets.WAVE2FA_RELEASES_PAT }}
                  path: releases
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 25.9.0

            - name: Install dependencies
              run: npm install

            - name: Bump version in package.json
              run: |
                  node -e "
                    const fs = require('fs');
                    const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
                    pkg.version = process.env.VERSION;
                    fs.writeFileSync('package.json', JSON.stringify(pkg, null, 4));
                  "

            - name: Build project
              run: |
                  echo "COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
                  echo "SHORT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
                  echo "BRANCH=${{ github.event.inputs.branch }}" >> $GITHUB_ENV
                  echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

                  npm run build:binary:linux
                  npm run build:binary:linux:arm64
                  npm run build:binary:mac
                  npm run build:binary:mac:arm64
                  npm run build:binary:win
                  npm run build:binary:win:arm64

                  mkdir -p .terminfo
                  if [ -d "./node_modules/blessed/usr" ]; then
                    cp -r ./node_modules/blessed/usr/* .terminfo/
                  fi

            - name: Commit bumped package.json
              run: |
                  git config --global user.name "github-actions"
                  git config --global user.email "github-actions@github.com"

                  git add package.json

                  if ! git diff --cached --quiet; then
                    git commit -m "bump version: ${VERSION}"
                    git push origin HEAD:${BRANCH}
                  fi

            - name: Create release bundles
              run: |
                  mkdir -p bundles

                  copy_terminfo() {
                    [ -d ".terminfo" ] && cp -r .terminfo "$1/"
                  }

                  pack() {
                    local name="$1" bin="$2" ext="${3:-}"
                    mkdir -p "tmp-$name"
                    mv "dist/$bin" "tmp-$name/wave2fa${ext}"
                    copy_terminfo "tmp-$name"
                    [ -z "$ext" ] && cp scripts/wave2fa.sh "tmp-$name/"
                    (cd "tmp-$name" && zip -r "../bundles/wave2fa-${name}.zip" .)
                    rm -rf "tmp-$name"
                  }

                  pack linux-x64    wave2fa-linux-x64
                  pack linux-arm64  wave2fa-linux-arm64
                  pack macos-x64    wave2fa-macos-x64
                  pack macos-arm64  wave2fa-macos-arm64
                  pack windows-x64  wave2fa-windows-x64.exe  .exe
                  pack windows-arm64 wave2fa-windows-arm64.exe .exe

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.WAVE2FA_RELEASES_PAT }}
              run: |
                  TAG="${BRANCH}-${VERSION}"

                  gh release create "$TAG" \
                    --repo wavedevgit/wave2fa-releases \
                    --title "wave2fa ${VERSION} (${BRANCH})" \
                    --notes "Branch: ${BRANCH} Commit: ${SHORT_COMMIT}" \
                    bundles/*.zip \
                    dist/bundle.cjs \
                    dist/bundle.cjs.map \
                    scripts/wave2fa.sh \
                    package.json

            - name: Generate metadata files
              run: |
                  mkdir -p "./releases/$BRANCH/$VERSION"
                  BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                  node -e "
                    const fs = require('fs');
                    const { execSync } = require('child_process');

                    const assets = [
                      ['bundles/wave2fa-linux-x64.zip',    'wave2fa-linux-x64.zip'],
                      ['bundles/wave2fa-linux-arm64.zip',  'wave2fa-linux-arm64.zip'],
                      ['bundles/wave2fa-macos-x64.zip',    'wave2fa-macos-x64.zip'],
                      ['bundles/wave2fa-macos-arm64.zip',  'wave2fa-macos-arm64.zip'],
                      ['bundles/wave2fa-windows-x64.zip',  'wave2fa-windows-x64.zip'],
                      ['bundles/wave2fa-windows-arm64.zip','wave2fa-windows-arm64.zip'],
                      ['dist/bundle.cjs',                 'bundle.cjs'],
                      ['dist/bundle.cjs.map',             'bundle.cjs.map'],
                      ['scripts/wave2fa.sh',               'wave2fa.sh'],
                      ['package.json',                     'package.json']
                    ];

                    const files = {};
                    for (const [path, name] of assets) {
                      const sha256 = execSync('sha256sum ' + path).toString().split(' ')[0];
                      const md5 = execSync('md5sum ' + path).toString().split(' ')[0];

                      files[name] = { sha256, md5 };
                    }

                    const meta = {
                      version: process.env.VERSION,
                      branch: process.env.BRANCH,
                      commit: process.env.COMMIT,
                      shortCommit: process.env.SHORT_COMMIT,
                      buildTime: new Date().toISOString(),
                      files
                    };

                    fs.writeFileSync('./releases/'+process.env.BRANCH+'/latest.json', JSON.stringify(meta, null, 2));

                    fs.writeFileSync('./releases/'+process.env.BRANCH+'/'+process.env.VERSION+'/info.json', JSON.stringify({
                      version: meta.version,
                      branch: meta.branch,
                      commit: meta.commit,
                      shortCommit: meta.shortCommit,
                      buildTime: meta.buildTime
                    }, null, 2));
                  "
            - name: Commit latest.json + info.json to branch folder
              run: |
                  cd releases
                  git config --global user.name "github-actions"
                  git config --global user.email "github-actions@github.com"

                  git add "$BRANCH/latest.json" "$BRANCH/$VERSION/info.json"

                  if ! git diff --cached --quiet; then
                    git commit -m "release metadata: ${BRANCH} @ ${VERSION} (${SHORT_COMMIT})"
                    git push 
                  fi
