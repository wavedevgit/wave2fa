name: Build

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version number to use for this build'
                required: true
                default: '0.0.1'
            branch:
                description: 'Branch to build'
                required: true
                default: 'main'

jobs:
    build:
        permissions:
            contents: write

        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.event.inputs.branch }}

            - name: Install Bun
              run: |
                  curl -fsSL https://bun.sh/install | bash
                  echo "$HOME/.bun/bin" >> $GITHUB_PATH

            - name: Install dependencies
              run: bun install

            - name: Build all binaries
              run: |
                  bun run build:ts

                  COMMIT=$(git rev-parse HEAD)
                  SHORT_COMMIT=$(git rev-parse --short HEAD)
                  BRANCH="${{ github.event.inputs.branch }}"
                  VERSION="${{ github.event.inputs.version }}"

                  echo "COMMIT=$COMMIT" >> $GITHUB_ENV
                  echo "SHORT_COMMIT=$SHORT_COMMIT" >> $GITHUB_ENV
                  echo "BRANCH=$BRANCH" >> $GITHUB_ENV
                  echo "VERSION=$VERSION" >> $GITHUB_ENV

                  mkdir -p dist/binaries
                  # thank you bun for this great feature
                  bun run build:binary:linux
                  bun run build:binary:linux:arm64
                  bun run build:binary:mac
                  bun run build:binary:mac:arm64
                  bun run build:binary:win
                  bun run build:binary:win:arm64

                  sed -i "s|commitHash|$SHORT_COMMIT|" dist/gitHash.js
                  sed -i "s|wave2faVersion|$VERSION|" dist/gitHash.js
                  sed -i "s|commitBranch|$BRANCH|" dist/gitHash.js

                  mkdir -p temp-binaries
                  mv dist/binaries temp-binaries
                  rm -rf dist
                  bun run build

                  sed -i "s|commitHash|$SHORT_COMMIT|" dist/bundle.js
                  sed -i "s|wave2faVersion|$VERSION|" dist/bundle.js
                  sed -i "s|commitBranch|$BRANCH|" dist/bundle.js
                  mv temp-binaries/* dist
                  rm -rf temp-binaries

            - name: Bump version
              run: |
                  bun -e "
                    const fs = require('fs');
                    const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
                    pkg.version = process.env.VERSION;
                    fs.writeFileSync('package.json', JSON.stringify(pkg, null, 4));
                  "
              env:
                  VERSION: ${{ github.event.inputs.version }}

            - name: Checkout releases repo
              uses: actions/checkout@v4
              with:
                  repository: wavedevgit/wave2fa-releases
                  token: ${{ secrets.WAVE2FA_RELEASES_PAT }}
                  path: releases

            - name: Copy build to releases repo + generate metadata
              run: |
                  TARGET="releases/${BRANCH}/${VERSION}"
                  export BRANCH_TARGET="releases/${BRANCH}"
                  mkdir -p "$TARGET/dist"

                  cp -r dist/* "$TARGET/dist"
                  cp scripts/wave2fa.sh "$TARGET/"
                  cp package.json "$TARGET/" || echo "no package.json"

                  cat > "$TARGET/info.json" <<EOF
                  {
                    "version": "${VERSION}",
                    "branch": "${BRANCH}",
                    "commit": "${COMMIT}",
                    "shortCommit": "${SHORT_COMMIT}",
                    "buildTime": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  }
                  EOF

                  VERSION_DIR="$TARGET"
                  export FILES_JSON="{}"

                  for f in $(find "$VERSION_DIR" -type f); do
                    REL_PATH=$(realpath --relative-to="$VERSION_DIR" "$f")
                    HASH=$(sha256sum "$f" | awk '{print $1}')

                    FILES_JSON=$(echo "$FILES_JSON" | bun -e "
                      const fs = require('fs');
                      const json = JSON.parse(process.argv[1]);
                      json[process.argv[2]] = {
                        path: process.argv[2],
                        sha256: process.argv[3]
                      };
                      console.log(JSON.stringify(json));
                    " "$FILES_JSON" "$REL_PATH" "$HASH")
                  done

                  bun -e "
                    const fs = require('fs');

                    const meta = {
                      version: process.env.VERSION,
                      branch: process.env.BRANCH,
                      commit: process.env.COMMIT,
                      shortCommit: process.env.SHORT_COMMIT,
                      buildTime: new Date().toISOString(),
                      files: JSON.parse(process.env.FILES_JSON || '{}')
                    };

                    fs.writeFileSync(
                      process.env.BRANCH_TARGET + '/latest.json',
                      JSON.stringify(meta, null, 4)
                    );
                  "
              env:
                  FILES_JSON: '{}'
                  TARGET: releases/${{ github.event.inputs.branch }}/${{ github.event.inputs.version }}

            - name: Create bundle zip
              run: |
                  ls dist
                  cd "releases/${BRANCH}/${VERSION}"
                  mkdir -p bundles
                  # Linux x64
                  mkdir -p tmp-linux-x64
                  cp dist/wave2fa-linux-x64 tmp-linux-x64/wave2fa
                  cp scripts/wave2fa.sh tmp-linux-x64/
                  (cd tmp-linux-x64 && zip -r "../bundles/wave2fa-linux-x64.zip" .)
                  rm -rf tmp-linux-x64

                  # Linux arm64
                  mkdir -p tmp-linux-arm64
                  cp dist/wave2fa-linux-arm64 tmp-linux-arm64/wave2fa
                  cp scripts/wave2fa.sh tmp-linux-arm64/
                  (cd tmp-linux-arm64 && zip -r "../bundles/wave2fa-linux-arm64.zip" .)
                  rm -rf tmp-linux-arm64

                  # macOS x64
                  mkdir -p tmp-macos-x64
                  cp dist/wave2fa-macos-x64 tmp-macos-x64/wave2fa
                  (cd tmp-macos-x64 && zip -r "../bundles/wave2fa-macos-x64.zip" .)
                  rm -rf tmp-macos-x64

                  # macOS arm64
                  mkdir -p tmp-macos-arm64
                  cp dist/wave2fa-macos-arm64 tmp-macos-arm64/wave2fa
                  (cd tmp-macos-arm64 && zip -r "../bundles/wave2fa-macos-arm64.zip" .)
                  rm -rf tmp-macos-arm64

                  # Windows x64
                  mkdir -p tmp-win-x64
                  cp dist/wave2fa-windows-x64.exe tmp-win-x64/wave2fa.exe
                  (cd tmp-win-x64 && zip -r "../bundles/wave2fa-windows-x64.zip" .)
                  rm -rf tmp-win-x64

                  # Windows arm64
                  mkdir -p tmp-win-arm64
                  cp dist/wave2fa-windows-arm64.exe tmp-win-arm64/wave2fa.exe
                  (cd tmp-win-arm64 && zip -r "../bundles/wave2fa-windows-arm64.zip" .)
                  rm -rf tmp-win-arm64
            - name: Commit & push
              run: |
                  git config --global user.name "github-actions"
                  git config --global user.email "github-actions@github.com"

                  git add package.json
                  if ! git diff --cached --quiet; then
                    git commit -m "bump version: ${VERSION}"
                    git push
                  fi

                  cd releases
                  git add .
                  if ! git diff --cached --quiet; then
                    git commit -m "release: ${BRANCH} @ ${VERSION} (${COMMIT})"
                    git push
                  fi
