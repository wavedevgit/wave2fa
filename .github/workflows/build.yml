name: Build

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version number to use for this build'
                required: true
                default: '0.0.1'
            branch:
                description: 'Branch to build'
                required: true
                default: 'main'

jobs:
    build:
        permissions:
            contents: write

        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.event.inputs.branch }}

            - name: Install Bun
              run: |
                  curl -fsSL https://bun.sh/install | bash
                  echo "$HOME/.bun/bin" >> $GITHUB_PATH

            - name: Install dependencies
              run: bun install

            - name: Build & Add git hash
              run: |
                  bun run build
                  COMMIT=$(git rev-parse --short HEAD)
                  BRANCH="${{ github.event.inputs.branch }}"
                  VERSION="${{ github.event.inputs.version }}"

                  sed -i "s|commitHash|$COMMIT|" dist/bundle.js
                  sed -i "s|wave2faVersion|$VERSION|" dist/bundle.js
                  sed -i "s|commitBranch|$BRANCH|" dist/bundle.js

            - name: Bump version (no jq pain)
              run: |
                  VERSION="${{ github.event.inputs.version }}"
                  node -e "
                    const fs = require('fs');
                    const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
                    pkg.version = process.env.VERSION;
                    fs.writeFileSync('package.json', JSON.stringify(pkg, null, 4));
                  "
              env:
                  VERSION: ${{ github.event.inputs.version }}

            - name: Checkout releases repo
              uses: actions/checkout@v4
              with:
                  repository: wavedevgit/wave2fa-releases
                  token: ${{ secrets.WAVE2FA_RELEASES_PAT }}
                  path: releases

            - name: Copy build to releases repo
              run: |
                  TARGET="releases/${{ github.event.inputs.branch }}/${{ github.event.inputs.version }}"
                  mkdir -p "$TARGET/dist"

                  cp -r dist/* "$TARGET/dist"
                  cp scripts/wave2fa.sh "$TARGET/"
                  cp package.json "$TARGET/" || echo "no package.json"

                  TARGET_DIR_BRANCH="releases/${{ github.event.inputs.branch }}"
                  VERSION_DIR="$TARGET_DIR_BRANCH/${{ github.event.inputs.version }}"

                  FILES_JSON="{}"

                  for f in $(find $VERSION_DIR -type f); do
                    REL_PATH=$(realpath --relative-to=$VERSION_DIR $f)
                    HASH=$(sha256sum "$f" | awk '{print $1}')
                    FILES_JSON=$(echo "$FILES_JSON" | bun -e "
                      const fs = require('fs');
                      let json = JSON.parse(process.argv[1]);
                      json[process.argv[2]] = {
                        path: process.argv[2],
                        sha256: process.argv[3]
                      };
                      console.log(JSON.stringify(json,null));
                    " "$FILES_JSON" "$REL_PATH" "$HASH")
                  done

                  bun -e "
                    const fs = require('fs');
                    const meta = {
                      version: '${{ github.event.inputs.version }}',
                      branch: '${{ github.event.inputs.branch }}',
                      commit: process.env.GITHUB_SHA,
                      shortCommit: process.env.GITHUB_SHA.slice(0,7),
                      buildTime: new Date().toISOString(),
                      files: JSON.parse(process.env.FILES_JSON || '{}')
                    };
                    fs.writeFileSync('$TARGET_DIR_BRANCH/latest.json', JSON.stringify(meta, null, 4));
                  "
              env:
                  FILES_JSON: '{}'

            - name: Create bundle zip
              run: |
                  (cd "releases/${{ github.event.inputs.branch }}/${{ github.event.inputs.version }}" && zip -r "bundle.zip" .)

            - name: Commit & push
              run: |
                  git config --global user.name "github-actions"
                  git config --global user.email "github-actions@github.com"

                  git add package.json
                  if ! git diff --cached --quiet; then
                    git commit -m "bump version: ${{ github.event.inputs.version }}"
                    git push
                  fi

                  cd releases
                  git add .
                  if ! git diff --cached --quiet; then
                    git commit -m "release: ${{ github.event.inputs.branch }} @ ${{ github.event.inputs.version }} (${GITHUB_SHA})"
                    git push
                  fi
